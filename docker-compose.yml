# CheckerAI + SetterAI - Full Stack Docker Compose
# 2 Backends + 1 Frontend + PostgreSQL

services:
  # PostgreSQL Database (shared)
  postgres:
    image: postgres:15-alpine
    container_name: checkerai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkerai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # CheckerAI Backend (Grading)
  checker-backend:
    build:
      context: ./CheckerAI - Backend
      dockerfile: Dockerfile
    container_name: checkerai-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/checkerai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - checker_uploads:/app/uploads
      - checker_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # SetterAI Backend (Paper Generation)
  setter-backend:
    build:
      context: ./SetterAI - Backend
      dockerfile: Dockerfile
    container_name: setterai-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/checkerai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - setter_uploads:/app/uploads
      - setter_data:/app/data
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (serves both UIs)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: checkerai-frontend
    ports:
      - "80:80"
    depends_on:
      - checker-backend
      - setter-backend
    restart: unless-stopped

volumes:
  postgres_data:
  checker_uploads:
  checker_data:
  setter_uploads:
  setter_data:
